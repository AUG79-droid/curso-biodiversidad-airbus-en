<script>
const preguntas = [{"id": 1, "pregunta": "What best describes biodiversity?", "opciones": ["The number of trees in a forest", "The variety of living beings, their genes and the ecosystems where they live", "Only endangered animals", "The area covered by protected natural spaces"], "correcta": 1, "explicacion": "Biodiversity includes species diversity, genetic diversity and ecosystem diversity.", "categoria": "Ecosystems", "nivel": "Basic"}, {"id": 2, "pregunta": "Which of these actions usually benefits biodiversity the most in an industrial setting?", "opciones": ["Replacing green areas with paving", "Planting only ornamental grass", "Creating areas with diverse native vegetation", "Removing all vegetation"], "correcta": 2, "explicacion": "Diverse native vegetation provides food, shelter and ecological connectivity.", "categoria": "Solutions", "nivel": "Basic"}, {"id": 3, "pregunta": "What is an invasive species?", "opciones": ["A local species that increases in spring", "An introduced species that can displace native ones", "An endangered species", "A species protected by law"], "correcta": 1, "explicacion": "Invasive species can spread quickly and cause ecological, economic or health impacts.", "categoria": "Species", "nivel": "Basic"}, {"id": 4, "pregunta": "Why can a temporary pond be valuable for biodiversity?", "opciones": ["Because it is always paved and clean", "Because it only serves to store industrial water", "Because it can function as a microhabitat for amphibians, insects and birds", "Because it prevents any vegetation from growing"], "correcta": 2, "explicacion": "Temporary ponds create important microhabitats for many organisms.", "categoria": "Ecosystems", "nivel": "Basic"}, {"id": 5, "pregunta": "Which of these factors can harm biodiversity on an industrial site?", "opciones": ["The presence of native plants", "Night-time light pollution", "Installing wildlife shelters", "Restoring degraded soils"], "correcta": 1, "explicacion": "Light pollution alters biological cycles, orientation and behaviour in many species.", "categoria": "Industry & Airbus", "nivel": "Intermediate"}, {"id": 6, "pregunta": "What benefit can a green roof bring to buildings or facilities?", "opciones": ["It completely eliminates aircraft noise", "It reduces the heat-island effect and improves local ecological conditions", "It replaces the building’s entire environmental management system", "It prevents the presence of any insects"], "correcta": 1, "explicacion": "Green roofs can reduce surface temperature and provide ecological value when well designed.", "categoria": "Solutions", "nivel": "Intermediate"}, {"id": 7, "pregunta": "In ecological restoration, what does prioritising native species mean?", "opciones": ["Choosing species for their striking colour", "Selecting species that are native to the region and adapted to the environment", "Choosing fast-growing exotic plants", "Using only one species"], "correcta": 1, "explicacion": "Native species are usually better adapted to the local climate, soil and ecological interactions.", "categoria": "Species", "nivel": "Intermediate"}, {"id": 8, "pregunta": "Which biological indicator can help assess the ecological recovery of a soil?", "opciones": ["The colour of the building paint", "The number of parking spaces", "The presence of macroinvertebrates or other bioindicator organisms", "The size of the main building"], "correcta": 2, "explicacion": "Bioindicators help detect changes in the ecological quality of soil and ecosystems.", "categoria": "Environmental Indicators", "nivel": "Intermediate"}, {"id": 9, "pregunta": "Which of these practices comes closest to greenwashing?", "opciones": ["Restoring a degraded area with ecological monitoring", "Installing nest boxes and assessing their use", "Communicating a big green action without real measures or verifiable results", "Reducing pesticide use and measuring the effects"], "correcta": 2, "explicacion": "Greenwashing means projecting a positive environmental image without real, sufficient or demonstrable actions behind it.", "categoria": "Industry & Airbus", "nivel": "Intermediate"}, {"id": 10, "pregunta": "Why is ecological connectivity important in fragmented landscapes?", "opciones": ["Because it reduces the need to assess impacts", "Because it allows species to move and improves resilience", "Because it replaces all conservation plans", "Because it removes the need for green areas"], "correcta": 1, "explicacion": "Ecological connectivity helps species move and maintain viable populations.", "categoria": "Ecosystems", "nivel": "Intermediate"}, {"id": 11, "pregunta": "What effect can soil sealing have on biodiversity?", "opciones": ["It improves water infiltration", "It reduces ecological soil functions and makes life harder for many species", "It encourages natural regeneration", "It is unrelated"], "correcta": 1, "explicacion": "Soil sealing reduces infiltration, gas exchange and biological activity.", "categoria": "Industry & Airbus", "nivel": "Intermediate"}, {"id": 12, "pregunta": "What is one of the main benefits of maintaining hedgerows or vegetated strips on an industrial site?", "opciones": ["Increasing pesticide use", "Supporting ecological corridors and shelter for wildlife", "Eliminating the need for environmental management", "Replacing any other measure"], "correcta": 1, "explicacion": "Hedgerows and vegetated strips help connect habitats and provide shelter.", "categoria": "Solutions", "nivel": "Intermediate"}, {"id": 13, "pregunta": "Which group of organisms often plays a key role as pollinators?", "opciones": ["Concrete and aggregates", "Bees, butterflies and other insects", "Only birds of prey", "Only fungi"], "correcta": 1, "explicacion": "Many insects are essential for pollination.", "categoria": "Species", "nivel": "Basic"}, {"id": 14, "pregunta": "Which practice is most suitable for restoring a degraded area within an industrial facility?", "opciones": ["Covering it completely with decorative gravel", "Introducing fast-growing exotic species", "Analysing the site and restoring it with suitable native species", "Leaving it isolated"], "correcta": 2, "explicacion": "Effective restoration requires analysing site conditions and using suitable native species.", "categoria": "Solutions", "nivel": "Intermediate"}, {"id": 15, "pregunta": "Why are insects important in ecosystems besides pollination?", "opciones": ["Because they fully replace birds", "Because they do not participate in food webs", "Because they contribute to decomposition, feeding relationships and ecological balance", "Because they only have aesthetic value"], "correcta": 2, "explicacion": "Insects are part of many ecological processes.", "categoria": "Ecosystems", "nivel": "Basic"}, {"id": 16, "pregunta": "Which of these measures best helps reduce risk to wildlife in industrial facilities?", "opciones": ["Increasing intense lighting all night", "Designing preventive measures and adapting infrastructure", "Removing all nearby vegetation", "Closing off every space with ecological potential"], "correcta": 1, "explicacion": "Prevention through design and infrastructure adaptation reduces risks for wildlife.", "categoria": "Industry & Airbus", "nivel": "Intermediate"}, {"id": 17, "pregunta": "What is a bioindicator?", "opciones": ["A mandatory legal document", "A species or organism whose presence provides information about environmental quality", "An efficient lighting system", "A technique for waterproofing soil"], "correcta": 1, "explicacion": "Bioindicators help interpret the ecological condition of an environment.", "categoria": "Environmental Indicators", "nivel": "Intermediate"}, {"id": 18, "pregunta": "In biodiversity terms, what does habitat fragmentation mean?", "opciones": ["Improved connectivity", "The division of a habitat into smaller, more isolated areas", "The natural appearance of new species", "The complete restoration of an ecosystem"], "correcta": 1, "explicacion": "Fragmentation makes it harder for species to move and reduces connectivity.", "categoria": "Ecosystems", "nivel": "Intermediate"}, {"id": 19, "pregunta": "Which approach best fits rigorous biodiversity management in a company?", "opciones": ["Carrying out one-off actions with no follow-up", "Communicating general commitments without verifiable measures", "Setting objectives, acting, measuring results and adjusting actions", "Limiting action to one annual campaign"], "correcta": 2, "explicacion": "Rigorous management requires planning, implementation, indicators, monitoring and continuous improvement.", "categoria": "Industry & Airbus", "nivel": "Intermediate"}, {"id": 20, "pregunta": "Which of these statements best describes a nature-based solution?", "opciones": ["A measure that uses ecological processes to solve environmental challenges and create multiple benefits", "Any green decoration in an office", "An action focused only on corporate image", "An intervention unrelated to the ecological context"], "correcta": 0, "explicacion": "Nature-based solutions harness ecological functions to address environmental challenges.", "categoria": "Solutions", "nivel": "Intermediate"}, {"id": 21, "pregunta": "What impact does soil compaction have in an industrial environment?", "opciones": ["It improves soil biodiversity", "It increases aeration and infiltration", "It reduces porosity and negatively affects soil organisms", "It has no ecological impact"], "correcta": 2, "explicacion": "Compaction reduces the air and water spaces in soil.", "categoria": "Environmental Indicators", "nivel": "Intermediate"}, {"id": 22, "pregunta": "What is the main objective of an ecological corridor?", "opciones": ["To separate ecosystems completely", "To facilitate the movement of species between habitats", "To reduce local biodiversity", "To increase urbanisation"], "correcta": 1, "explicacion": "Ecological corridors connect fragmented habitats.", "categoria": "Ecosystems", "nivel": "Intermediate"}, {"id": 23, "pregunta": "Which indicator is most useful for evaluating biodiversity in an area?", "opciones": ["Number of nearby buildings", "Diversity of species present", "Amount of operating machinery", "Annual electricity consumption"], "correcta": 1, "explicacion": "Species diversity is a key indicator of biodiversity status.", "categoria": "Environmental Indicators", "nivel": "Basic"}, {"id": 24, "pregunta": "What effect does intensive pesticide use have on biodiversity?", "opciones": ["It increases species diversity", "It has no impact", "It can negatively affect non-target species", "It improves pollination"], "correcta": 2, "explicacion": "Pesticides can affect beneficial insects and other non-target organisms.", "categoria": "Industry & Airbus", "nivel": "Intermediate"}, {"id": 25, "pregunta": "What characteristic defines a resilient ecosystem?", "opciones": ["It never changes", "It recovers after disturbances", "It has a single dominant species", "It does not need water"], "correcta": 1, "explicacion": "Resilience is the capacity of an ecosystem to recover.", "categoria": "Ecosystems", "nivel": "Intermediate"}, {"id": 26, "pregunta": "What role do soil microorganisms play?", "opciones": ["No relevant role", "They only degrade artificial materials", "They take part in nutrient cycling and decomposition", "They remove the need for plants"], "correcta": 2, "explicacion": "Microorganisms are key in biogeochemical cycles and soil fertility.", "categoria": "Ecosystems", "nivel": "Intermediate"}, {"id": 27, "pregunta": "Which is a good practice to support biodiversity in industrial green areas?", "opciones": ["Uniform lawns with frequent mowing", "Diversifying plant species and using differentiated management", "Completely removing spontaneous vegetation", "Intensive herbicide use"], "correcta": 1, "explicacion": "Plant diversity and adaptive management support richer, more functional habitats.", "categoria": "Solutions", "nivel": "Intermediate"}, {"id": 28, "pregunta": "What risk does artificial lighting pose to wildlife?", "opciones": ["None", "It improves natural behaviour", "It alters biological cycles and activity patterns", "It increases reproduction"], "correcta": 2, "explicacion": "Artificial light can disorient species and affect circadian rhythms.", "categoria": "Industry & Airbus", "nivel": "Intermediate"}, {"id": 29, "pregunta": "What is genetic diversity?", "opciones": ["The number of ecosystems in a region", "Genetic variability within a species", "The number of different species", "The number of individuals in a population"], "correcta": 1, "explicacion": "Genetic diversity allows adaptation and survival in the face of environmental change.", "categoria": "Species", "nivel": "Intermediate"}, {"id": 30, "pregunta": "Which is a sign of ecological recovery in a restored area?", "opciones": ["A total absence of life", "The gradual return of different species", "The elimination of all insects", "An increase in paved surfaces"], "correcta": 1, "explicacion": "The progressive recolonisation by species indicates ecological improvement.", "categoria": "Environmental Indicators", "nivel": "Intermediate"}, {"id": 31, "pregunta": "In an ecological restoration project, which criterion is key before intervening?", "opciones": ["Choosing species for aesthetics", "Analysing soil, climate and surrounding conditions", "Planting as many species as possible", "Minimising cost without a prior study"], "correcta": 1, "explicacion": "A prior diagnosis is essential to ensure restoration success.", "categoria": "Solutions", "nivel": "Expert"}, {"id": 32, "pregunta": "Which metric makes it possible to assess the ecological quality of a habitat beyond the number of species?", "opciones": ["Number of workers in the area", "Diversity indices such as Shannon or Simpson", "Total paved area", "Number of buildings"], "correcta": 1, "explicacion": "Diversity indices consider both species richness and relative abundance.", "categoria": "Environmental Indicators", "nivel": "Expert"}, {"id": 33, "pregunta": "What is the risk of introducing non-native species in restoration?", "opciones": ["Greater ecosystem stability", "No relevant impact", "Displacement of native species and disruption of ecological balance", "Automatic improvement of biodiversity"], "correcta": 2, "explicacion": "Non-native species can become invasive.", "categoria": "Species", "nivel": "Expert"}, {"id": 34, "pregunta": "Which approach best represents continuous improvement in biodiversity?", "opciones": ["Acting once with no follow-up", "Measuring, evaluating and adjusting actions regularly", "Running communication campaigns only", "Avoiding any intervention"], "correcta": 1, "explicacion": "Continuous improvement involves monitoring, measurement and adaptation.", "categoria": "Industry & Airbus", "nivel": "Expert"}, {"id": 35, "pregunta": "What role do green infrastructures play in industrial environments?", "opciones": ["A purely decorative one", "Reducing biodiversity", "Integrating ecological functions such as thermal regulation and habitat", "Eliminating the need for environmental management"], "correcta": 2, "explicacion": "Green infrastructures provide both ecological and functional benefits.", "categoria": "Solutions", "nivel": "Expert"}, {"id": 36, "pregunta": "Which factor is critical to maintain viable wildlife populations?", "opciones": ["Complete isolation", "Habitat fragmentation", "Availability of resources and connectivity", "Removal of vegetation"], "correcta": 2, "explicacion": "Species need food, shelter and connectivity in order to survive.", "categoria": "Ecosystems", "nivel": "Expert"}, {"id": 37, "pregunta": "Which indicator can warn of an ecological imbalance?", "opciones": ["A controlled increase in biodiversity", "Excessive dominance of a single species", "An increase in native species", "Population stability"], "correcta": 1, "explicacion": "One overly dominant species can indicate a loss of ecological balance.", "categoria": "Environmental Indicators", "nivel": "Expert"}, {"id": 38, "pregunta": "Which strategy is most effective for integrating biodiversity into a company?", "opciones": ["Isolated actions with no coordination", "Integration into corporate strategy and KPIs", "External communication only", "Avoiding measurement of results"], "correcta": 1, "explicacion": "Strategic integration enables real and lasting impact.", "categoria": "Industry & Airbus", "nivel": "Expert"}, {"id": 39, "pregunta": "What is the relationship between biodiversity and climate resilience?", "opciones": ["None", "Biodiversity reduces the capacity to adapt", "Greater biodiversity usually increases resilience to change", "It only affects marine ecosystems"], "correcta": 2, "explicacion": "Diverse ecosystems are generally more resistant to climate-related disturbances.", "categoria": "Ecosystems", "nivel": "Expert"}, {"id": 40, "pregunta": "Which approach avoids greenwashing in biodiversity?", "opciones": ["Communicating without data", "Carrying out symbolic actions", "Defining indicators, measuring impact and reporting results", "Limiting action to environmental marketing"], "correcta": 2, "explicacion": "Transparency and measurement are key to avoiding greenwashing.", "categoria": "Industry & Airbus", "nivel": "Expert"}, {"id": 41, "pregunta": "In an industrial environment, which decision would have the greatest real positive impact on biodiversity?", "opciones": ["Installing decorative green features in offices", "Creating an integrated plan with restoration, monitoring and KPIs", "Publishing environmental communication campaigns", "Carrying out one symbolic annual action"], "correcta": 1, "explicacion": "Integrated actions with monitoring and indicators create real, measurable impact.", "categoria": "Industry & Airbus", "nivel": "Expert"}, {"id": 42, "pregunta": "If no new species appear in a restored area after some time, what would be most appropriate?", "opciones": ["Consider the project successful anyway", "Abandon the area", "Reassess ecological conditions and adjust the measures", "Remove the existing vegetation"], "correcta": 2, "explicacion": "A lack of biological response indicates that the intervention needs to be reviewed and adapted.", "categoria": "Solutions", "nivel": "Expert"}, {"id": 43, "pregunta": "Which indicator would best reflect the success of a green corridor at Airbus Getafe?", "opciones": ["Number of meetings held", "Increase in species and wildlife use of the space", "Nearby paved area", "Number of internal posts"], "correcta": 1, "explicacion": "Actual use of the corridor by wildlife and increased biodiversity are key indicators.", "categoria": "Environmental Indicators", "nivel": "Expert"}, {"id": 44, "pregunta": "Which approach is most appropriate when an invasive species is present on site?", "opciones": ["Ignore it", "Remove it without analysis", "Assess its impact and apply appropriate control measures", "Promote its spread"], "correcta": 2, "explicacion": "Management should be based on technical assessment and specific measures.", "categoria": "Species", "nivel": "Expert"}, {"id": 45, "pregunta": "Which decision best reflects environmental leadership in a company?", "opciones": ["Acting only when there are audits", "Implementing proactive measures based on evidence", "Limiting action to minimum legal compliance", "Avoiding investment in sustainability"], "correcta": 1, "explicacion": "Leadership means anticipating issues and acting on a scientific basis.", "categoria": "Industry & Airbus", "nivel": "Expert"}, {"id": 46, "pregunta": "Which combination of factors most supports biodiversity on an industrial site?", "opciones": ["Intense lighting and uniform lawn", "Native vegetation, connectivity and adaptive management", "Elimination of wildlife", "A completely sealed surface"], "correcta": 1, "explicacion": "The combination of suitable habitat, connectivity and management is key.", "categoria": "Solutions", "nivel": "Expert"}, {"id": 47, "pregunta": "Which indicator can anticipate ecological deterioration before it becomes visible?", "opciones": ["Number of emails sent", "Changes in bioindicator communities", "Number of meetings", "Colour of buildings"], "correcta": 1, "explicacion": "Bioindicators detect early changes in the ecosystem.", "categoria": "Environmental Indicators", "nivel": "Expert"}, {"id": 48, "pregunta": "Which approach is most effective for raising employee awareness about biodiversity?", "opciones": ["Long documents with no interaction", "Hands-on experiences, games and active participation", "Regulations only", "One-off annual communication"], "correcta": 1, "explicacion": "Active participation improves understanding, retention and commitment.", "categoria": "Industry & Airbus", "nivel": "Expert"}, {"id": 49, "pregunta": "What is the most common mistake in corporate biodiversity projects?", "opciones": ["Measuring results", "Acting without diagnosis or follow-up", "Using native species", "Integrating biodiversity into strategy"], "correcta": 1, "explicacion": "Without diagnosis and follow-up, actions lose effectiveness.", "categoria": "Industry & Airbus", "nivel": "Expert"}, {"id": 50, "pregunta": "What defines the real success of a corporate biodiversity strategy?", "opciones": ["The number of communication campaigns", "Measurable, lasting impact aligned with strategy", "Isolated actions", "Cost reduction only"], "correcta": 1, "explicacion": "Success is based on real, measurable impact aligned with the business strategy.", "categoria": "Industry & Airbus", "nivel": "Expert"}];
const CATEGORIES = [{"name": "Species", "desc": "Flora and fauna, native and invasive"}, {"name": "Ecosystems", "desc": "Habitats, connectivity and resilience"}, {"name": "Solutions", "desc": "Measures and ecological restoration"}, {"name": "Industry & Airbus", "desc": "Application in industrial settings"}, {"name": "Environmental Indicators", "desc": "Metrics, bioindicators and monitoring"}];
const state = {mode:null,pool:[],currentIndex:0,score:0,answered:[]};
const app=document.getElementById('app'), navMode=document.getElementById('navMode'), navCategory=document.getElementById('navCategory');
const shuffle=(arr)=>[...arr].sort(()=>Math.random()-0.5);
const setNav=(mode,cat)=>{navMode.textContent=mode||'Home';navCategory.textContent=cat||'Knowledge Base';};
function showWelcome() {
  setNav('Home','Knowledge Base');
  app.innerHTML=`<section class="screen"><div class="hero dark card"><div class="hero-copy"><div class="eyebrow">Comprehensive biodiversity learning</div><h1>BiodiverTrivial<br>Airbus</h1><p>An interactive challenge to learn biodiversity with environmental rigour, good practice and criteria applicable to industrial settings.</p><div class="hero-actions"><button class="btn btn-primary" id="btnStart">Start the challenge</button><button class="btn btn-secondary" id="btnExplore">Explore modes</button></div><div class="stats"><div><strong>50</strong><span>total questions</span></div><div><strong>5</strong><span>categories</span></div><div><strong>3</strong><span>levels</span></div></div></div><div class="hero-right"><div class="hero-showcase"><div class="showcase-main"><div class="showcase-main-ui"><span class="game-badge">Mission mode</span><span class="game-badge">+10 pts</span></div><div class="showcase-score"><strong>5/5</strong><span>categories clave</span></div><div class="showcase-orb"><div class="orb-ring"></div><div class="orb-core"></div></div><div class="showcase-main-copy"><span class="mini">Industrial biodiversity</span><h3>Learn through play, apply on site</h3><p>A visual experience that turns environmental concepts into more informed decisions.</p></div></div><div class="showcase-card"><div class="showcase-icon">🌿</div><h4>5 categories</h4><p>Especies, ecosistemas, soluciones, indicadores y aplicación industrial.</p></div><div class="showcase-card"><div class="showcase-icon">🏆</div><h4>Levels and achievements</h4><p>Progress, improve your score and strengthen learning with immediate feedback.</p></div></div></div></div></section>`;
  document.getElementById('btnStart').addEventListener('click', showModes);
  document.getElementById('btnExplore').addEventListener('click', showModes);
}
function showModes(){
  setNav('Mode selection','Knowledge Base');
  app.innerHTML=`<section class="screen"><div class="section-head"><div><div class="eyebrow blue">Session setup</div><h2>Choose your level of depth</h2></div></div><div class="mode-grid"><article class="mode-card card"><div class="mode-image quick"></div><div class="mode-body"><div class="pill">Efficient assessment</div><h3>Quick challenge</h3><p>10 random questions with mixed difficulty to play in just a few minutes.</p><button class="btn btn-primary" id="btnQuick">Start assessment</button></div></article><article class="mode-card card"><div class="mode-image expert"></div><div class="mode-body"><div class="pill">Technical deep dive</div><h3>Expert mode</h3><p>50 questions with full progression for a deeper, more demanding and memorable experience.</p><button class="btn btn-secondary" id="btnExpert">Enter the analysis</button></div></article></div><div class="categories card"><div class="section-head"><h2 style="font-size:28px">Category specialisation</h2></div><div class="categories-grid" id="catGrid"></div></div></section>`;
  document.getElementById('btnQuick').addEventListener('click',()=>startGame('quick'));
  document.getElementById('btnExpert').addEventListener('click',()=>startGame('expert'));
  const catGrid=document.getElementById('catGrid');
  CATEGORIES.forEach(cat=>{const item=document.createElement('div');item.className='cat';item.innerHTML=`<div class="cat-img"></div><div class="cat-body"><h4>${cat.name}</h4><p>${cat.desc}</p><button class="btn btn-ghost">Play category</button></div>`;item.querySelector('button').addEventListener('click',()=>startCategory(cat.name));catGrid.appendChild(item);});
}
function startCategory(cat){state.mode='quick';state.pool=shuffle(preguntas.filter(q=>q.categoria===cat)).slice(0,10);if(!state.pool.length) state.pool=shuffle(preguntas).slice(0,5);state.currentIndex=0;state.score=0;state.answered=[];showQuestion();}
function startGame(mode){state.mode=mode;state.pool=shuffle(preguntas).slice(0,mode==='expert'?50:10);state.currentIndex=0;state.score=0;state.answered=[];showQuestion();}
const currentQ=()=>state.pool[state.currentIndex];
function showQuestion(){const q=currentQ();if(!q) return showResults();setNav(state.mode==='expert'?'Expert mode':'Quick challenge',q.categoria);const p=Math.round((state.currentIndex/state.pool.length)*100);app.innerHTML=`<section class="screen"><div class="qtop"><div><div class="eyebrow blue">Question ${state.currentIndex+1} of ${state.pool.length}</div><h2 class="qtitle">Cuestionario of Biodiversidad</h2></div><div style="display:flex;gap:10px;flex-wrap:wrap"><span class="pill">${q.categoria}</span><span class="pill">${q.nivel}</span></div></div><div class="progress"><div style="width:${p}%"></div></div><div class="qlayout card"><div><div class="qmark">?</div><h3 class="qtext">${q.pregunta}</h3><p class="qhelp">Select the answer you think is most correct and score points to move forward in the mission.</p><div class="mission-hud"><div class="mission-chip">Question ${state.currentIndex+1}/${state.pool.length}</div><div class="mission-chip">Reward: +10 pts</div><div class="mission-chip">Active category</div></div></div><div><div class="answers-head"><h4>Choose your answer</h4><span>1 correct option</span></div><div class="answers" id="answers"></div></div></div><div style="margin-top:18px"><button class="btn btn-ghost" id="btnSkip">Skip</button></div></section>`;const answers=document.getElementById('answers');q.opciones.forEach((op,i)=>{const btn=document.createElement('button');btn.className='answer';btn.innerHTML=`<span class="letter">${String.fromCharCode(65+i)}</span><span>${op}</span>`;btn.addEventListener('click',()=>answer(i));answers.appendChild(btn);});document.getElementById('btnSkip').addEventListener('click',nextQuestion);}
function answer(i){const q=currentQ();const correct=i===q.correcta;if(correct) state.score+=10;state.answered.push({categoria:q.categoria,correct});showFeedback(correct,q);}
function showFeedback(correct,q){setNav('Feedback',q.categoria);app.innerHTML=`<section class="screen"><div class="feedback card"><div class="feedback-visual"><div class="feedback-status ${correct?'ok':'ko'}"><div class="feedback-symbol">${correct?'✓':'✕'}</div><h3>${correct?'Perfect answer':'Not yet'}</h3><p>${correct?'Has identificado correctamente el concepto clave of esta pregunta.':'Useful miss: learning continues with the explanation and the next round.'}</p></div></div><div class="feedback-copy"><div class="eyebrow blue">Feedback</div><h2>${correct?'Excellent answer!':'Incorrect answer'}</h2><p>${q.explicacion}</p><div style="display:flex;gap:10px;margin:18px 0;flex-wrap:wrap"><span class="pill">${correct?'+10 puntos':'+0 puntos'}</span><span class="pill">${q.nivel}</span><span class="pill">${q.categoria}</span></div><button class="btn btn-primary" id="btnNext">Next question</button></div></div></section>`;document.getElementById('btnNext').addEventListener('click',nextQuestion);}
function nextQuestion(){state.currentIndex+=1;if(state.currentIndex>=state.pool.length) showResults(); else showQuestion();}
function getLevel(acc){if(acc>=85) return 'Airbus Biodiversity Ambassador'; if(acc>=65) return 'Guardián of biodiversidad'; return 'Basic Explorer';}
function getMessage(acc){if(acc>=85) return 'Has demostrado un alto nivel of comprensión sobre biodiversidad aplicada a entornos industriales.'; if(acc>=65) return 'Good result. You already handle key concepts and can continue going deeper.'; return 'Buen punto of partida. Repite el reto y consolida los conceptos esenciales.';}
function categoryPerformance(best){const groups={};state.answered.forEach(a=>{if(!groups[a.categoria]) groups[a.categoria]={total:0,ok:0};groups[a.categoria].total+=1;if(a.correct) groups[a.categoria].ok+=1;});const entries=Object.keys(groups).map(k=>[k,groups[k].total?groups[k].ok/groups[k].total:0]);if(!entries.length) return '—';entries.sort((a,b)=>best?b[1]-a[1]:a[1]-b[1]);return entries[0][0];}
function showResults(){const total=state.pool.length*10;const acc=total?Math.round((state.score/total)*100):0;setNav('Resultados','Knowledge Base');app.innerHTML=`<section class="screen"><div class="results card"><div><div class="eyebrow blue">Assessment completed</div><h2 style="font-size:52px;margin:6px 0 8px;line-height:.96">Final results</h2><div class="score">${state.score} pts</div><div class="level">${getLevel(acc)}</div><p>${getMessage(acc)}</p><div style="display:flex;gap:14px;margin-top:24px;flex-wrap:wrap"><button class="btn btn-primary" id="btnRestart">Play again</button><button class="btn btn-secondary" id="btnModes">Change mode</button></div></div><div><div class="result-image"></div><div class="result-rank"><div class="rank-card"><strong>${state.pool.length}</strong><span>questions played</span></div><div class="rank-card"><strong>${Math.round(state.score/10)}</strong><span>correct answers</span></div></div><div class="metric"><div class="metric-row"><span>% of correct answers</span><strong>${acc}%</strong></div><div class="metric-row"><span>Strongest category</span><strong>${categoryPerformance(true)}</strong></div><div class="metric-row"><span>Category to improve</span><strong>${categoryPerformance(false)}</strong></div></div></div></div></section>`;document.getElementById('btnRestart').addEventListener('click',showWelcome);document.getElementById('btnModes').addEventListener('click',showModes);}
showWelcome();
</script>
